name: Backend CI/CD Pipeline

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-despacho:latest

      - name: Deploy to EC2 Backend via Frontend proxy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ssh -i ~/key-despacho.pem -o StrictHostKeyChecking=no ec2-user@10.0.133.200 "
              sudo docker pull fr4nk17/backend-despacho:latest &&
              sudo docker-compose -f ~/app/docker-compose.yml down &&
              sudo docker-compose -f ~/app/docker-compose.yml up -d
            "
